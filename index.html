<script>

// ================= STATE =================
let role = "";
let mode = "encode";

// ================= UTIL =================
function mod10(n){
  return ((n % 10) + 10) % 10;
}

// ================= MAPPING =================
const map = {
  D:1,Y:2,C:3,A:4,M:5,E:6,R:7,S:8,O:9,N:0
};

const reverseMap = Object.fromEntries(
  Object.entries(map).map(([k,v]) => [v,k])
);

// ================= LOGIN =================
function login(){
  let pin = document.getElementById("pin").value;

  if(pin === "1818"){
    role = "owner";
    document.getElementById("welcome").innerText = "Welcome Admin VIP";
  }
  else if(pin === "0000"){
    role = "guest";
    document.getElementById("welcome").innerText = "Welcome Guest Reguler";
  }
  else{
    alert("PIN Salah");
    return;
  }

  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";
}

// ================= LOGOUT =================
function logout(){
  role = "";
  document.getElementById("login").style.display = "block";
  document.getElementById("app").style.display = "none";
  document.getElementById("input").value = "";
  document.getElementById("result").innerText = "";
  document.getElementById("steps").innerText = "";
}

// ================= MODE =================
function setMode(m){
  mode = m;

  document.getElementById("btnEncode").className =
    m === "encode"
    ? "flex-1 py-3 text-lg rounded-xl bg-black text-white"
    : "flex-1 py-3 text-lg rounded-xl bg-gray-300";

  document.getElementById("btnDecode").className =
    m === "decode"
    ? "flex-1 py-3 text-lg rounded-xl bg-black text-white"
    : "flex-1 py-3 text-lg rounded-xl bg-gray-300";
}

// ================= ENCODE =================
function encode(price){

  let digits = price.replace(/[^0-9]/g,"").split("").map(Number);

  if(digits.length < 2){
    return {result:"", steps:""};
  }

  let key = digits[1];
  let originalKey = key;

  if(key === 0) key = 2;

  let zeroStreak = 0;

  let steps = "=== PROSES ENCODE ===\n";
  steps += "Key: " + originalKey + (originalKey===0 ? " → 2" : "") + "\n\n";

  let result = digits.map((d,i)=>{

    if(i === 1) return d;

    // RULE 000 (berbasis key)
    if(d === 0 && i > 1){
      let val = mod10(0 - (key + (zeroStreak * 2)));

      steps += "Digit " + (i+1) +
      ": 0 - (" + key + "+" + (zeroStreak*2) + ") = " + val + "\n";

      zeroStreak++;
      return val;
    }

    // NORMAL
    zeroStreak = 0;
    let val = mod10(d - key);

    steps += "Digit " + (i+1) +
    ": " + d + " - " + key + " = " + val + "\n";

    return val;
  });

  return {
    result: result.map(d => reverseMap[d]).join(""),
    steps
  };
}

// ================= DECODE =================
function decode(code){

  let digits = code.toUpperCase().split("").map(l => map[l]);

  if(digits.length < 2){
    return {result:"", steps:""};
  }

  let key = digits[1];
  let originalKey = key;

  if(key === 0) key = 2;

  let zeroStreak = 0;

  let steps = "=== PROSES DECODE ===\n";
  steps += "Key: " + originalKey + (originalKey===0 ? " → 2" : "") + "\n\n";

  let result = digits.map((d,i)=>{

    if(i === 1) return d;

    let expected = mod10(0 - (key + (zeroStreak * 2)));

    // DETEKSI 000
    if(i > 1 && d === expected){
      steps += "Digit " + (i+1) + ": pola 0\n";
      zeroStreak++;
      return 0;
    }

    // NORMAL
    zeroStreak = 0;
    let val = mod10(d + key);

    steps += "Digit " + (i+1) +
    ": " + d + " + " + key + " = " + val + "\n";

    return val;
  });

  return {
    result: result.join(""),
    steps
  };
}

// ================= PROCESS =================
function process(){

  let input = document.getElementById("input").value;

  if(!input){
    alert("Input dulu");
    return;
  }

  let res;

  if(mode === "encode"){
    res = encode(input);
  } else {
    res = decode(input);
  }

  document.getElementById("result").innerText = res.result;

  if(role === "owner"){
    document.getElementById("steps").innerText = res.steps;
  } else {
    document.getElementById("steps").innerText = "";
  }
}

</script>
